# ---- Capture (VHF), geteilt: Live-Bridge + Recorder + Live-Monitor ----
pcm.vhfsnoop {
    type dsnoop
    ipc_key 7841
    ipc_perm 0666
    slave {
        pcm "hw:3,0"
        channels 1
        rate 44100
        format S16_LE
        period_size 1024
        buffer_size 8192
    }
}
pcm.vhf {
    type plug
    slave.pcm "vhfsnoop"
}

# ---- Playback (C-Media Ausgang / Messe), geteilt: VHF-Monitor + OwnTone ----
pcm.vhfout {
    type dmix
    ipc_key 7842
    ipc_perm 0666
    slave {
        pcm "hw:3,0"
        rate 44100
        format S16_LE
        channels 2
        period_size 1024
        buffer_size 8192
    }
}
pcm.vhfoutplug {
    type plug
    slave.pcm "vhfout"
}
